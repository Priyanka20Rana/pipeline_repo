trigger: none

pool:
  name: pipeline-agentpool

steps:
- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendServiceArm: 'first-sc'
    backendAzureRmResourceGroupName: 'tf-backend-rg'
    backendAzureRmStorageAccountName: 'tfstatecentral12345'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'prod.terraform.tfstate'

- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'validate'
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'plan'
    environmentServiceNameAzureRM: 'first-sc'
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'apply'
    commandOptions: '-auto-approve'
    environmentServiceNameAzureRM: 'first-sc'
- task: TerraformTask@5
  inputs:
    provider: 'azurerm'
    command: 'destroy'
    commandOptions: '-auto-approve'
    environmentServiceNameAzureRM: 'first-sc'


